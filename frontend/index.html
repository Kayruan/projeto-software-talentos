<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConectaSul</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/styles.css">

  <script>
    tailwind.config = { theme: { extend: { fontFamily: { outfit: ['Outfit', 'sans-serif'], space: ['Space Grotesk', 'sans-serif'] }, colors: { primary: '#7c3aed', surface: '#14142a' } } } }
  </script>
</head>
<body class="flex flex-col">

  <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-2">
      <i data-lucide="zap" class="text-purple-500 w-8 h-8"></i>
      <h1 class="text-2xl font-bold font-space tracking-tight">ConectaSul🚀</h1>
    </div>
    <div id="auth-section" class="flex gap-4 items-center"></div>
  </nav>

  <header class="py-16 px-6 text-center">
    <h2 class="text-4xl md:text-5xl font-bold mb-6">Encontre os melhores talentos na sua região</h2>
    <div class="flex justify-center gap-8 mt-12 mb-8">
      <div class="text-center glass p-4 rounded-xl w-32"><p id="stat-providers" class="text-3xl font-bold text-purple-400">0</p><p class="text-sm text-gray-400">Profissionais</p></div>
      <div class="text-center glass p-4 rounded-xl w-32"><p id="stat-categories" class="text-3xl font-bold text-purple-400">0</p><p class="text-sm text-gray-400">Categorias</p></div>
      <div class="text-center glass p-4 rounded-xl w-32"><p id="stat-cities" class="text-3xl font-bold text-purple-400">0</p><p class="text-sm text-gray-400">Cidades</p></div>
    </div>
  </header>

  <main class="flex-1 container mx-auto px-6 pb-20">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-xl font-bold">Profissionais Disponíveis</h3>
      <div class="relative w-64">
        <i data-lucide="search" class="absolute left-3 top-3 w-4 h-4 text-gray-500"></i>
        <input type="text" id="search-input" placeholder="Buscar profissional..." class="w-full bg-surface border border-gray-800 rounded-lg py-2 pl-10 pr-4 text-sm focus:outline-none focus:border-purple-500 transition-colors">
      </div>
    </div>
    <div id="providers-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <div id="toast" class="toast flex items-center gap-2 shadow-xl shadow-purple-500/20">
    <i data-lucide="info" class="w-5 h-5"></i>
    <span id="toast-msg"></span>
  </div>

  <div id="loginModal" class="modal fixed inset-0 bg-black/80 items-center justify-center z-[100] backdrop-blur-sm">
    <div class="bg-surface p-8 rounded-2xl w-full max-w-sm border border-gray-800 relative">
      <button onclick="fecharModais()" class="absolute top-4 right-4 text-gray-500 hover:text-white"><i data-lucide="x"></i></button>
      <h2 class="text-2xl font-bold mb-6 text-center">Entrar</h2>
      <input type="email" id="login-email" placeholder="Email" class="w-full bg-[#0a0a12] border border-gray-800 rounded-lg p-3 mb-4 focus:border-purple-500 outline-none">
      <input type="password" id="login-pass" placeholder="Senha" class="w-full bg-[#0a0a12] border border-gray-800 rounded-lg p-3 mb-6 focus:border-purple-500 outline-none">
      <button onclick="doLogin()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition-colors">Acessar Conta</button>
    </div>
  </div>

  <div id="signupModal" class="modal fixed inset-0 bg-black/80 items-center justify-center z-[100] backdrop-blur-sm">
    <div class="bg-surface p-8 rounded-2xl w-full max-w-md border border-gray-800 relative max-h-[90vh] overflow-y-auto">
      <button onclick="fecharModais()" class="absolute top-4 right-4 text-gray-500 hover:text-white"><i data-lucide="x"></i></button>
      <h2 class="text-2xl font-bold mb-6 text-center">Criar Conta</h2>
      <div class="grid gap-4 mb-6">
        <input type="text" id="cad-nome" placeholder="Nome Completo" class="w-full bg-[#0a0a12] border border-gray-800 rounded-lg p-3 outline-none">
        <input type="email" id="cad-email" placeholder="Email" class="w-full bg-[#0a0a12] border border-gray-800 rounded-lg p-3 outline-none">
        <input type="password" id="cad-senha" placeholder="Senha" class="w-full bg-[#0a0a12] border border-gray-800 rounded-lg p-3 outline-none">
        <input type="text" id="cad-cidade" placeholder="Cidade" class="w-full bg-[#0a0a12] border border-gray-800 rounded-lg p-3 outline-none">
        <select id="cad-tipo" class="w-full bg-[#0a0a12] border border-gray-800 rounded-lg p-3 outline-none text-gray-300" onchange="toggleProfissao()">
          <option value="cliente">Sou Cliente</option>
          <option value="prestador">Sou Profissional</option>
        </select>
        <div id="cad-extra" class="hidden flex-col gap-4 border-t border-gray-800 pt-4 mt-2">
          <input type="text" id="cad-categoria" placeholder="Profissão (ex: Encanador)" class="w-full bg-[#0a0a12] border border-gray-800 rounded-lg p-3 outline-none">
          <textarea id="cad-descricao" placeholder="Descreva seus serviços..." rows="3" class="w-full bg-[#0a0a12] border border-gray-800 rounded-lg p-3 outline-none resize-none"></textarea>
        </div>
      </div>
      <button onclick="doSignup()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition-colors">Cadastrar</button>
    </div>
  </div>
<div id="perfilModal" class="modal fixed inset-0 bg-black/80 items-center justify-center z-[100] backdrop-blur-sm">
    <div class="bg-surface w-full max-w-2xl border border-gray-800 relative max-h-[90vh] overflow-y-auto rounded-2xl">
      
      <div class="h-32 bg-gradient-to-r from-purple-900 to-purple-600 relative">
        <button onclick="fecharModais()" class="absolute top-4 right-4 text-white hover:text-purple-300 bg-black/40 p-2 rounded-full backdrop-blur-md transition-colors"><i data-lucide="x"></i></button>
      </div>

      <div id="perfil-content" class="px-8 pb-8 -mt-12 relative z-10">
         </div>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>

</body>
</html>
