<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaSul - Minha Agenda</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="flex flex-col min-h-screen bg-[#050508] text-gray-100">

    <nav class="bg-[#161626] border-b border-gray-800/80 sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-xl">
        <div class="flex items-center gap-3">
            <div class="bg-purple-600 p-2 rounded-xl shadow-lg">
                <i data-lucide="calendar" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-2xl font-bold font-space tracking-tight text-white">Minha Agenda</h1>
        </div>
        <a href="dashboard.html" class="text-gray-400 hover:text-white flex items-center gap-2 transition-colors font-medium text-sm">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar ao Painel
        </a>
    </nav>

    <main class="flex-1 container mx-auto px-6 py-12 max-w-4xl">
        <div class="mb-8">
            <h2 class="text-3xl font-extrabold font-space text-white mb-2">Central de Serviços e Orçamentos</h2>
            <p class="text-gray-400 text-sm">Gerencie suas ordens de serviço recebidas ou acompanhe seus pedidos enviados.</p>
        </div>

        <div class="flex border-b border-gray-800 mb-6 gap-2">
            <button id="aba-recebidos" onclick="mudarAba('recebidos')" class="px-4 py-2.5 text-sm font-bold border-b-2 border-purple-500 text-purple-400 transition-all">
                📥 Serviços Requeridos (Me solicitaram)
            </button>
            <button id="aba-enviados" onclick="mudarAba('enviados')" class="px-4 py-2.5 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-white transition-all">
                📤 Serviços Solicitados (Eu pedi para outros)
            </button>
        </div>

        <div id="agenda-lista" class="space-y-4">
            </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        let currentUser = null;
        let abaAtiva = 'recebidos'; // 'recebidos' ou 'enviados'

        window.onload = async () => {
            lucide.createIcons();
            const session = localStorage.getItem('conectasul_session');
            if (!session) { window.location.replace('index.html'); return; }
            currentUser = JSON.parse(session);

            // Se for cliente comum, ele não recebe ordens de serviço, vai direto para enviados
            if (currentUser.tipo_conta !== 'prestador') {
                document.getElementById('aba-recebidos').style.display = 'none';
                mudarAba('enviados');
            } else {
                carregarAgendaGeral();
            }
        };

        function mudarAba(aba) {
            abaAtiva = aba;
            const btnRecebidos = document.getElementById('aba-recebidos');
            const btnEnviados = document.getElementById('aba-enviados');

            if(aba === 'recebidos') {
                btnRecebidos.className = "px-4 py-2.5 text-sm font-bold border-b-2 border-purple-500 text-purple-400 transition-all";
                btnEnviados.className = "px-4 py-2.5 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-white transition-all";
            } else {
                btnEnviados.className = "px-4 py-2.5 text-sm font-bold border-b-2 border-purple-500 text-purple-400 transition-all";
                btnRecebidos.className = "px-4 py-2.5 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-white transition-all";
            }
            carregarAgendaGeral();
        }

        async function carregarAgendaGeral() {
            const lista = document.getElementById('agenda-lista');
            lista.innerHTML = '<div class="text-center text-gray-500 py-8">Sincronizando registros...</div>';
            
            try {
                // Define a rota com base na aba ativa
                const endpoint = abaAtiva === 'recebidos' ? `prestador/${currentUser.id}` : `cliente/${currentUser.id}`;
                const res = await fetch(`${API_URL}/agendamentos/${endpoint}`);
                if (!res.ok) throw new Error();
                
                const agendamentos = await res.json();

                if (!agendamentos || agendamentos.length === 0) {
                    lista.innerHTML = `
                        <div class="bg-[#161626] p-12 rounded-2xl text-center border border-gray-800">
                            <i data-lucide="calendar-x" class="w-12 h-12 text-gray-600 mx-auto mb-4"></i>
                            <p class="text-gray-400 font-medium">Nenhum serviço registrado nesta aba.</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                lista.innerHTML = '';
                agendamentos.forEach(ag => {
                    const dataObj = new Date(ag.data_hora);
                    const dataFormatada = dataObj.toLocaleDateString('pt-BR') + ' às ' + dataObj.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                    
                    const nomeCorrespondente = abaAtiva === 'recebidos'
                        ? (ag.cliente ? ag.cliente.nome : 'Cliente Desconhecido')
                        : (ag.prestador ? ag.prestador.nome : 'Profissional');
                        
                    const telefoneCorrespondente = abaAtiva === 'recebidos'
                        ? (ag.cliente ? ag.cliente.telefone : '')
                        : (ag.prestador ? ag.prestador.telefone : '');

                    const status = (ag.status || 'pendente').toLowerCase();
                    const valorOrcamento = ag.valor_orcamento || 0;

                    let statusCor = 'bg-gray-800 text-gray-300 border-gray-700';
                    let blocoAcoes = '';

                    // LOGICA DE AÇÕES - SE EU RECEBI O PEDIDO (SOU O PRESTADOR DA ABA RECEBIDOS)
                    if (abaAtiva === 'recebidos') {
                        if (status === 'pendente') {
                            statusCor = 'bg-amber-950/40 text-amber-400 border-amber-800/50';
                            blocoAcoes = `
                                <div class="flex gap-2">
                                    <input type="number" id="input-preco-${ag.id}" placeholder="R$" class="bg-[#050508] border border-gray-700 rounded-xl px-2 py-1 text-sm text-white w-20 outline-none">
                                    <button onclick="enviarOrcamento('${ag.id}')" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded-lg text-xs font-bold">Orçar</button>
                                </div>
                            `;
                        } else if (status === 'orcado') {
                            statusCor = 'bg-indigo-950/40 text-indigo-400 border-indigo-800/50';
                            blocoAcoes = `<span class="text-xs text-gray-400 italic">Aguardando cliente</span>`;
                        } else if (status === 'aceito') {
                            statusCor = 'bg-blue-950/40 text-blue-400 border-blue-800/50';
                            blocoAcoes = `<button onclick="mudarStatus('${ag.id}', 'concluido')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold">Concluir</button>`;
                        } else if (status === 'recusado') {
                            statusCor = 'bg-red-950/40 text-red-400 border-red-900/50';
                        } else {
                            statusCor = 'bg-emerald-950/40 text-emerald-400 border-emerald-800/50';
                        }
                    } else {
                        // SE EU ENVIEI O PEDIDO (SOU O CLIENTE DA ABA ENVIADOS)
                        if (status === 'pendente') {
                            statusCor = 'bg-amber-950/40 text-amber-400 border-amber-800/50';
                            blocoAcoes = `<span class="text-xs text-gray-400 italic">Aguardando preço</span>`;
                        } else if (status === 'orcado') {
                            statusCor = 'bg-indigo-950/40 text-indigo-400 border-indigo-800/50';
                            blocoAcoes = `
                                <div class="flex gap-2">
                                    <button onclick="mudarStatus('${ag.id}', 'recusado')" class="bg-red-900/20 text-red-400 px-3 py-1 rounded-lg text-xs font-bold">Recusar</button>
                                    <button onclick="mudarStatus('${ag.id}', 'aceito')" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded-lg text-xs font-bold">Aceitar</button>
                                </div>
                            `;
                        } else if (status === 'aceito') {
                            statusCor = 'bg-blue-950/40 text-blue-400 border-blue-800/50';
                        } else if (status === 'recusado') {
                            statusCor = 'bg-red-950/40 text-red-400 border-red-900/50';
                        } else {
                            statusCor = 'bg-emerald-950/40 text-emerald-400 border-emerald-800/50';
                        }
                    }

                    const foneLimpo = (telefoneCorrespondente || '').replace(/\D/g, '');
                    const linkZap = foneLimpo ? `https://wa.me/55${foneLimpo}` : '#';

                    lista.innerHTML += `
                        <div class="bg-[#161626] p-5 rounded-2xl border border-white/5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shadow-md">
                            <div class="flex-1 w-full">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-[9px] px-2 py-0.5 rounded-full border font-black uppercase tracking-wider ${statusCor}">${status}</span>
                                    <span class="text-gray-500 text-xs">${dataFormatada}</span>
                                    ${valorOrcamento > 0 ? `<span class="text-emerald-400 font-extrabold text-xs ml-2">R$ ${valorOrcamento.toFixed(2)}</span>` : ''}
                                </div>
                                <h3 class="font-bold text-lg text-white">${nomeCorrespondente}</h3>
                                <p class="text-gray-400 text-sm mt-1 italic">"${ag.descricao_servico}"</p>
                            </div>
                            <div class="flex items-center gap-3 w-full md:w-auto justify-end border-t border-gray-800/50 md:border-0 pt-3 md:pt-0">
                                ${foneLimpo ? `
                                    <a href="${linkZap}" target="_blank" class="bg-gray-800 p-2.5 rounded-xl hover:bg-gray-700 transition-colors">
                                        <i data-lucide="message-circle" class="w-4 h-4 text-green-400"></i>
                                    </a>
                                ` : ''}
                                ${blocoAcoes}
                            </div>
                        </div>
                    `;
                });
                lucide.createIcons();
            } catch (err) {
                lista.innerHTML = `<div class="text-red-400 text-center py-4">Erro ao processar a aba.</div>`;
            }
        }

        async function enviarOrcamento(id) {
            const val = document.getElementById(`input-preco-${id}`).value;
            if(!val || val <= 0) return alert("Digite um valor válido.");
            try {
                const res = await fetch(`${API_URL}/agendamentos/${id}/status?novo_status=orcado&valor_orcamento=${val}`, { method: 'PATCH' });
                if (res.ok) carregarAgendaGeral();
            } catch (err) { alert("Erro ao orçar."); }
        }

        async function mudarStatus(id, novoStatus) {
            if(!confirm("Confirmar alteração de status?")) return;
            try {
                const res = await fetch(`${API_URL}/agendamentos/${id}/status?novo_status=${novoStatus}`, { method: 'PATCH' });
                if (res.ok) carregarAgendaGeral();
            } catch (err) { alert("Erro ao atualizar."); }
        }
    </script>
</body>
</html>
