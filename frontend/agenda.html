<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaSul - Minha Agenda</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="flex flex-col min-h-screen bg-[#050508] text-white">

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-gray-800/50">
        <div class="flex items-center gap-2">
            <i data-lucide="calendar" class="text-purple-500 w-8 h-8"></i>
            <h1 class="text-2xl font-bold font-space tracking-tight text-white">Minha Agenda</h1>
        </div>
        <a href="dashboard.html" class="text-gray-400 hover:text-white flex items-center gap-2 transition-colors">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar ao Início
        </a>
    </nav>

    <main class="flex-1 container mx-auto px-6 py-12 max-w-4xl">
        <h2 class="text-3xl font-bold mb-2 font-space">Pedidos de Serviço</h2>
        <p class="text-gray-400 mb-8">Gerencie as solicitações de clientes e entre em contato para alinhar detalhes.</p>

        <div id="agenda-lista" class="space-y-4">
            <div class="text-center py-12 text-gray-500">
                <div class="animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-purple-500 rounded-full mb-4" role="status"></div>
                <p>Carregando sua agenda...</p>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    
    <script>
        // Inicialização
        window.onload = async () => {
            lucide.createIcons();
            const session = localStorage.getItem('conectasul_session');
            if (!session) { window.location.replace('index.html'); return; }
            
            const user = JSON.parse(session);
            if (user.tipo_conta !== 'prestador') { window.location.replace('dashboard.html'); return; }

            carregarAgenda(user.id);
        };

        async function carregarAgenda(prestadorId) {
            const lista = document.getElementById('agenda-lista');
            try {
                // A chamada agora casa com o backend unificado
                const res = await fetch(`${API_URL}/agendamentos/prestador/${prestadorId}`);
                if (!res.ok) throw new Error("Erro ao buscar agenda");
                
                const agendamentos = await res.json();

                if (!agendamentos || agendamentos.length === 0) {
                    lista.innerHTML = `
                        <div class="glass p-12 rounded-2xl text-center border border-gray-800">
                            <i data-lucide="calendar-x" class="w-16 h-16 text-gray-700 mx-auto mb-4"></i>
                            <h3 class="text-xl font-bold text-white mb-2">Agenda Vazia</h3>
                            <p class="text-gray-400">Você ainda não recebeu pedidos de serviço.</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                lista.innerHTML = '';
                agendamentos.forEach(ag => {
                    const dataObj = new Date(ag.data_hora);
                    const dataFormatada = dataObj.toLocaleDateString('pt-BR') + ' às ' + dataObj.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                    
                    // Sincronizado com o alias 'cliente' do backend
                    const nomeCliente = ag.cliente ? ag.cliente.nome : 'Cliente Desconhecido';
                    const telefoneCliente = ag.cliente ? ag.cliente.telefone : '';
                    
                    const foneLimpo = telefoneCliente ? telefoneCliente.replace(/\D/g, '') : '';
                    const linkZap = foneLimpo ? `https://wa.me/55${foneLimpo}?text=Olá ${encodeURIComponent(nomeCliente)}, sou o prestador do ConectaSul. Vamos conversar sobre seu pedido?` : '#';
                    
                    const statusPendente = ag.status === 'pendente';
                    const statusCor = statusPendente 
                        ? 'bg-yellow-900/30 text-yellow-500 border-yellow-700/50' 
                        : 'bg-green-900/30 text-green-500 border-green-700/50';

                    lista.innerHTML += `
                        <div class="glass p-6 rounded-2xl border border-purple-500/20 hover:border-purple-500/40 transition-all flex flex-col md:flex-row justify-between gap-6 items-start md:items-center">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-3">
                                    <span class="bg-purple-900/40 text-purple-300 text-[11px] px-3 py-1 rounded-full border border-purple-700/50 font-bold tracking-wider">
                                        ${dataFormatada}
                                    </span>
                                    <span class="${statusCor} text-[10px] px-2 py-0.5 rounded border uppercase font-black tracking-widest">
                                        ${ag.status}
                                    </span>
                                </div>
                                <h3 class="font-bold text-2xl text-white">${nomeCliente}</h3>
                                <div class="flex items-start gap-2 mt-2">
                                    <i data-lucide="info" class="w-4 h-4 text-purple-400 mt-0.5 shrink-0"></i>
                                    <p class="text-gray-400 text-sm leading-relaxed">${ag.descricao_servico}</p>
                                </div>
                            </div>
                            
                            <div class="flex flex-col gap-2 w-full md:w-auto">
                                ${foneLimpo ? `
                                <a href="${linkZap}" target="_blank" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 shadow-lg shadow-green-900/20">
                                    <i data-lucide="message-circle" class="w-4 h-4"></i> WhatsApp
                                </a>
                                ` : ''}
                                
                                ${statusPendente ? `
                                <button onclick="finalizarAgendamento('${ag.id}')" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-6 py-3 rounded-xl text-sm font-bold transition-all border border-gray-700">
                                    Concluir Serviço
                                </button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });
                lucide.createIcons();
            } catch (err) {
                console.error(err);
                lista.innerHTML = `
                    <div class="bg-red-900/20 border border-red-500/50 p-6 rounded-2xl text-center">
                        <p class="text-red-400">Não foi possível carregar a agenda. Verifique sua conexão.</p>
                    </div>
                `;
            }
        }

        async function finalizarAgendamento(id) {
            if(!confirm("Deseja marcar este serviço como concluído?")) return;
            // Aqui você poderia criar uma rota PUT no backend para mudar o status
            alert("Funcionalidade de conclusão: ID " + id);
        }
    </script>
</body>
</html>
