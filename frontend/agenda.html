<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaSul - Minha Agenda</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="flex flex-col min-h-screen bg-[#050508] text-white">

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-gray-800/50">
        <div class="flex items-center gap-2">
            <i data-lucide="calendar" class="text-purple-500 w-8 h-8"></i>
            <h1 class="text-2xl font-bold font-space tracking-tight text-white">Minha Agenda</h1>
        </div>
        <a href="dashboard.html" class="text-gray-400 hover:text-white flex items-center gap-2 transition-colors">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar ao Início
        </a>
    </nav>

    <main class="flex-1 container mx-auto px-6 py-12 max-w-4xl">
        <h2 class="text-3xl font-bold mb-2 font-space">Pedidos de Serviço</h2>
        <p class="text-gray-400 mb-8">Acompanhe seus agendamentos e atualize o status conforme o progresso.</p>

        <div id="agenda-lista" class="space-y-4">
            <div class="text-center py-12 text-gray-500">
                <div class="animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-purple-500 rounded-full mb-4"></div>
                <p>Sincronizando com o banco de dados...</p>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    
    <script>
        window.onload = async () => {
            lucide.createIcons();
            const session = localStorage.getItem('conectasul_session');
            if (!session) { window.location.replace('index.html'); return; }
            
            const user = JSON.parse(session);
            if (user.tipo_conta !== 'prestador') { window.location.replace('dashboard.html'); return; }

            carregarAgenda(user.id);
        };

        async function carregarAgenda(prestadorId) {
            const lista = document.getElementById('agenda-lista');
            try {
                const res = await fetch(`${API_URL}/agendamentos/prestador/${prestadorId}`);
                if (!res.ok) throw new Error("Erro ao buscar agenda");
                
                const agendamentos = await res.json();

                if (!agendamentos || agendamentos.length === 0) {
                    lista.innerHTML = `
                        <div class="glass p-12 rounded-2xl text-center border border-gray-800">
                            <i data-lucide="calendar-x" class="w-16 h-16 text-gray-700 mx-auto mb-4"></i>
                            <p class="text-gray-400 font-medium">Nenhum pedido encontrado no momento.</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                lista.innerHTML = '';
                agendamentos.forEach(ag => {
                    const dataObj = new Date(ag.data_hora);
                    const dataFormatada = dataObj.toLocaleDateString('pt-BR') + ' às ' + dataObj.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                    
                    const nomeCliente = ag.cliente ? ag.cliente.nome : 'Cliente Desconhecido';
                    const telefoneCliente = ag.cliente ? ag.cliente.telefone : '';
                    const status = ag.status.toLowerCase();

                    // --- LÓGICA DE ESTADOS (STATE MACHINE) ---
                    let statusConfig = {
                        cor: 'bg-gray-800 text-gray-400 border-gray-700',
                        botao: ''
                    };

                    if (status === 'pendente') {
                        statusConfig.cor = 'bg-yellow-900/30 text-yellow-500 border-yellow-700/50';
                        statusConfig.botao = `
                            <button onclick="mudarStatus('${ag.id}', 'aceito')" class="w-full md:w-auto bg-purple-600 hover:bg-purple-700 text-white px-6 py-2.5 rounded-xl font-bold text-sm transition-all shadow-lg shadow-purple-900/20">
                                Aceitar Pedido
                            </button>
                        `;
                    } else if (status === 'aceito') {
                        statusConfig.cor = 'bg-blue-900/30 text-blue-400 border-blue-700/50';
                        statusConfig.botao = `
                            <button onclick="mudarStatus('${ag.id}', 'concluido')" class="w-full md:w-auto bg-green-600 hover:bg-green-700 text-white px-6 py-2.5 rounded-xl font-bold text-sm transition-all shadow-lg shadow-green-900/20">
                                Finalizar Serviço
                            </button>
                        `;
                    } else if (status === 'concluido') {
                        statusConfig.cor = 'bg-green-900/30 text-green-500 border-green-700/50';
                        statusConfig.botao = `<span class="text-xs text-gray-500 font-medium italic flex items-center gap-1"><i data-lucide="check-circle-2" class="w-4 h-4"></i> Serviço Concluído</span>`;
                    }

                    const foneLimpo = telefoneCliente.replace(/\D/g, '');
                    const linkZap = `https://wa.me/55${foneLimpo}?text=Olá ${encodeURIComponent(nomeCliente)}, sou o prestador do ConectaSul.`;

                    lista.innerHTML += `
                        <div class="glass p-6 rounded-2xl border border-white/5 flex flex-col md:flex-row justify-between gap-6 items-start md:items-center transition-all hover:bg-white/[0.02]">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-3">
                                    <span class="text-[10px] px-2.5 py-1 rounded-full border font-black uppercase tracking-widest ${statusConfig.cor}">
                                        ${status}
                                    </span>
                                    <span class="text-gray-500 text-xs font-medium">${dataFormatada}</span>
                                </div>
                                <h3 class="font-bold text-2xl text-white">${nomeCliente}</h3>
                                <p class="text-gray-400 text-sm mt-2 leading-relaxed italic">"${ag.descricao_servico}"</p>
                            </div>
                            
                            <div class="flex flex-col md:flex-row items-center gap-3 w-full md:w-auto">
                                ${foneLimpo ? `
                                    <a href="${linkZap}" target="_blank" class="w-full md:w-auto bg-gray-800 hover:bg-gray-700 p-3 rounded-xl transition-colors flex items-center justify-center border border-gray-700">
                                        <i data-lucide="message-circle" class="w-5 h-5 text-green-500"></i>
                                    </a>
                                ` : ''}
                                ${statusConfig.botao}
                            </div>
                        </div>
                    `;
                });
                lucide.createIcons();
            } catch (err) {
                console.error(err);
                lista.innerHTML = `<div class="text-red-500 text-center py-8">Erro de conexão com a API.</div>`;
            }
        }

        async function mudarStatus(id, novoStatus) {
            const mensagem = novoStatus === 'aceito' ? "Deseja aceitar este serviço?" : "Deseja marcar este serviço como concluído?";
            if(!confirm(mensagem)) return;

            try {
                // Chamada para a nova rota de status do Python
                const res = await fetch(`${API_URL}/agendamentos/${id}/status?novo_status=${novoStatus}`, {
                    method: 'PATCH'
                });

                if (res.ok) {
                    const user = JSON.parse(localStorage.getItem('conectasul_session'));
                    carregarAgenda(user.id); // Recarrega a lista para mostrar a mudança
                } else {
                    alert("Erro ao atualizar o banco de dados.");
                }
            } catch (err) {
                console.error(err);
                alert("Erro de rede.");
            }
        }
    </script>
</body>
</html>
