<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaSul - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 15, 25, 0.7); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-[#050508] text-white flex items-center justify-center min-h-screen">
    <div class="glass p-8 rounded-2xl w-full max-w-md border border-purple-500/20 shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-purple-600">ConectaSul</h2>
            <p class="text-gray-400 mt-2">Acesse sua conta</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm text-gray-400 mb-2">E-mail</label>
                <input type="email" id="email" class="w-full bg-black/40 border border-gray-800 rounded-xl p-3 text-white focus:border-purple-500 outline-none transition-all" required>
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-2">Senha</label>
                <input type="password" id="senha" class="w-full bg-black/40 border border-gray-800 rounded-xl p-3 text-white focus:border-purple-500 outline-none transition-all" required>
            </div>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-xl font-bold transition-all shadow-lg shadow-purple-600/20">Entrar</button>
        </form>

        <p class="mt-8 text-center text-gray-400">
            Ainda não tem conta? <a href="cadastro.html" class="text-purple-400 hover:text-purple-300 font-semibold">Cadastre-se</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            // Chama sua função de login (garanta que ela salve no localStorage)
            const result = await login(email, senha); 
            if (result) window.location.href = 'index.html';
        };
    </script>
</body>
</html>
