<script>
    function toggleCamposExtra() {
        const tipo = document.getElementById('cad-tipo').value;
        document.getElementById('campos-prestador').classList.toggle('hidden', tipo !== 'prestador');
    }

    document.getElementById('cadastro-form').onsubmit = async (e) => {
        e.preventDefault();
        
        // Monta o objeto com os dados do formulário
        const usuario = {
            nome: document.getElementById('cad-nome').value,
            email: document.getElementById('cad-email').value,
            senha: "senha_padrao_por_enquanto", // Como não botamos campo de senha no HTML antes, podemos criar um ou gerar
            telefone: document.getElementById('cad-fone').value,
            tipo_conta: document.getElementById('cad-tipo').value, // Alterado para tipo_conta para bater com seu BD
            cidade: document.getElementById('cad-cidade').value,
            categoria: document.getElementById('cad-categoria').value,
            servicos: document.getElementById('cad-servicos').value
        };

        // Chama a função do api.js
        await registrar(usuario);
    };
</script>
